name: Terminology Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  va-balance-terminology:
    name: Reject legacy balance wording
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check VA Balance terminology
        run: bun run check:terminology
